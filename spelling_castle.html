<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Spelling Castle 👑</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root{
    --cream:#fdf6ee;
    --blush:#f7e7ef;
    --gold:#e6ab46;
    --gold-soft:#f6d488;
    --lav:#a87fce;
    --lav-deep:#7d57a6;
    --rose:#e892ab;
    --plum:#4f3d5c;
    --green:#5fb878;
    --tile:#ffffff;
    --slot:#f3e6f4;
    --font:"Fredoka","Trebuchet MS",-apple-system,system-ui,sans-serif;
  }
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
  html,body{margin:0;height:100%;}
  body{
    font-family:var(--font);
    color:var(--plum);
    background:
      radial-gradient(1200px 600px at 50% -10%, #fff7e9 0%, transparent 60%),
      radial-gradient(900px 500px at 90% 110%, #f3e2f3 0%, transparent 55%),
      linear-gradient(160deg, var(--cream), var(--blush));
    min-height:100%;
    display:flex;flex-direction:column;
    overflow-x:hidden;
    -webkit-user-select:none;user-select:none;
    touch-action:manipulation;
  }
  /* ---------- header ---------- */
  header{
    padding:14px 18px 6px;
    text-align:center;
  }
  .title{
    font-size:clamp(26px,5vw,40px);
    font-weight:700;
    letter-spacing:.5px;
    color:var(--lav-deep);
    text-shadow:0 2px 0 #fff, 0 4px 14px rgba(125,87,166,.18);
    margin:0;
  }
  .title .c{color:var(--gold);}
  /* crown progress strip */
  .crowns{
    display:flex;flex-wrap:wrap;justify-content:center;gap:5px;
    margin:10px auto 2px;max-width:560px;
  }
  .crowns .cr{
    font-size:18px;line-height:1;filter:grayscale(1) opacity(.32);
    transition:transform .35s ease, filter .35s ease;
  }
  .crowns .cr.on{filter:none;transform:scale(1.18);}
  /* control bar */
  .bar{
    display:flex;align-items:center;justify-content:center;gap:8px;flex-wrap:wrap;
    margin-top:8px;
  }
  .btn{
    font-family:var(--font);font-weight:600;font-size:15px;color:var(--plum);
    background:#fff;border:2px solid #ecdcc4;border-radius:999px;
    padding:8px 14px;cursor:pointer;display:inline-flex;align-items:center;gap:6px;
    box-shadow:0 3px 0 rgba(0,0,0,.05);transition:transform .12s ease,background .2s;
  }
  .btn:active{transform:translateY(2px);box-shadow:none;}
  .btn.toggle.off{background:#f0e7e7;color:#b4a6a6;border-color:#e2d6d6;}
  .counter{
    font-weight:600;font-size:15px;color:var(--lav-deep);
    background:#fff;border-radius:999px;padding:8px 14px;border:2px solid #e7d8ef;
  }
  .nav{
    background:#fff;border:2px solid #e7d8ef;border-radius:50%;
    width:40px;height:40px;font-size:20px;color:var(--lav-deep);cursor:pointer;
    display:inline-flex;align-items:center;justify-content:center;line-height:1;
  }
  .nav:active{transform:scale(.92);}
  .nav:disabled{opacity:.3;cursor:default;}
  /* ---------- main play area ---------- */
  main{
    flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;
    gap:clamp(14px,3vh,26px);padding:10px 16px 28px;position:relative;
  }
  .stage{
    background:rgba(255,255,255,.62);
    border:3px solid #fff;
    border-radius:32px;
    padding:clamp(18px,4vw,34px) clamp(20px,5vw,46px);
    box-shadow:0 20px 50px rgba(125,87,166,.16), inset 0 0 0 2px rgba(230,171,70,.18);
    display:flex;flex-direction:column;align-items:center;gap:clamp(12px,2.6vh,22px);
    backdrop-filter:blur(2px);
  }
  .pic{font-size:clamp(66px,15vw,108px);line-height:1;filter:drop-shadow(0 8px 12px rgba(0,0,0,.12));}
  .model{
    font-size:clamp(26px,7vw,46px);font-weight:600;letter-spacing:.22em;
    color:rgba(125,87,166,.34);text-transform:none;height:1.1em;
    transition:opacity .25s;
  }
  .model.hide{opacity:0;}
  /* slots */
  .slots{display:flex;gap:clamp(8px,2.4vw,16px);}
  .slot{
    width:clamp(64px,18vw,104px);height:clamp(64px,18vw,104px);
    border-radius:22px;background:var(--slot);
    border:3px dashed #c9aedd;
    display:flex;align-items:center;justify-content:center;
    font-size:clamp(34px,9vw,58px);font-weight:600;color:var(--lav-deep);
    transition:transform .25s, background .25s, border-color .25s;
  }
  .slot.filled{
    background:linear-gradient(180deg,#eafbef,#d6f3df);
    border:3px solid var(--green);color:#2f7a45;
    animation:pop .4s cubic-bezier(.2,1.4,.4,1);
  }
  @keyframes pop{0%{transform:scale(.6);}60%{transform:scale(1.15);}100%{transform:scale(1);}}
  /* tray */
  .tray{display:flex;gap:clamp(10px,3vw,20px);flex-wrap:wrap;justify-content:center;min-height:1px;}
  .tile{
    width:clamp(66px,18vw,108px);height:clamp(66px,18vw,108px);
    border-radius:22px;background:var(--tile);
    border:3px solid var(--gold-soft);
    font-family:var(--font);font-size:clamp(36px,9vw,60px);font-weight:600;color:var(--gold);
    cursor:pointer;display:flex;align-items:center;justify-content:center;
    box-shadow:0 6px 0 #e9d3a3, 0 10px 20px rgba(230,171,70,.25);
    transition:transform .12s ease,box-shadow .12s ease,opacity .25s;
  }
  .tile:active{transform:translateY(4px);box-shadow:0 2px 0 #e9d3a3;}
  .tile.gone{opacity:0;transform:scale(.4);pointer-events:none;}
  .tile.wiggle{animation:wig .42s ease;}
  @keyframes wig{0%,100%{transform:translateX(0);}20%{transform:translateX(-8px) rotate(-4deg);}40%{transform:translateX(8px) rotate(4deg);}60%{transform:translateX(-6px) rotate(-3deg);}80%{transform:translateX(6px) rotate(3deg);}}
  .tile.hintGlow{animation:glow 1s ease infinite;border-color:var(--rose);}
  @keyframes glow{0%,100%{transform:translateY(0) scale(1);box-shadow:0 6px 0 #e9d3a3,0 0 0 0 rgba(232,146,171,.6);}50%{transform:translateY(-8px) scale(1.06);box-shadow:0 12px 0 #e9d3a3,0 0 0 12px rgba(232,146,171,0);}}
  .row{display:flex;gap:10px;}
  /* ---------- sparkles + overlays ---------- */
  .spark{position:fixed;pointer-events:none;font-size:26px;animation:rise 1.3s ease-out forwards;z-index:40;}
  @keyframes rise{0%{opacity:0;transform:translateY(0) scale(.4);}15%{opacity:1;}100%{opacity:0;transform:translateY(-130px) scale(1.3) rotate(40deg);}}
  .overlay{
    position:fixed;inset:0;display:none;flex-direction:column;align-items:center;justify-content:center;
    gap:22px;background:rgba(79,61,92,.32);backdrop-filter:blur(4px);z-index:50;
    animation:fade .3s ease;
  }
  .overlay.show{display:flex;}
  @keyframes fade{from{opacity:0;}to{opacity:1;}}
  .burst{font-size:clamp(70px,20vw,140px);animation:pop .5s cubic-bezier(.2,1.4,.4,1);}
  .ov-word{font-size:clamp(34px,9vw,60px);font-weight:700;color:#fff;letter-spacing:.18em;text-shadow:0 4px 16px rgba(0,0,0,.3);}
  .ov-btn{
    font-family:var(--font);font-weight:700;font-size:22px;color:#fff;
    background:linear-gradient(180deg,var(--rose),#d4748f);border:none;border-radius:999px;
    padding:16px 40px;cursor:pointer;box-shadow:0 8px 0 #b85f78,0 14px 30px rgba(0,0,0,.25);
    display:inline-flex;align-items:center;gap:10px;
  }
  .ov-btn:active{transform:translateY(4px);box-shadow:0 4px 0 #b85f78;}
  .ov-sub{color:#fff;font-size:20px;font-weight:500;opacity:.95;text-shadow:0 2px 8px rgba(0,0,0,.3);}
</style>
</head>
<body>
  <header>
    <h1 class="title">👑 Spelling <span class="c">Castle</span> 👑</h1>
    <div class="crowns" id="crowns"></div>
    <div class="bar">
      <button class="nav" id="prev" aria-label="previous">◀</button>
      <span class="counter" id="counter">1 / 15</span>
      <button class="nav" id="next" aria-label="next">▶</button>
      <button class="btn" id="hint">💡 Hint</button>
      <button class="btn" id="redo">🔄 Again</button>
      <button class="btn toggle" id="showWord">👁 Word</button>
      <button class="btn toggle" id="sound">🔊 Sound</button>
    </div>
  </header>

  <main>
    <div class="stage">
      <div class="pic" id="pic">🐱</div>
      <div class="model" id="model">cat</div>
      <div class="slots" id="slots"></div>
      <div class="tray" id="tray"></div>
    </div>
  </main>

  <!-- word-complete overlay -->
  <div class="overlay" id="ovWord">
    <div class="burst" id="ovBurst">🌟</div>
    <div class="ov-word" id="ovWordText">CAT</div>
    <button class="ov-btn" id="ovNext">Next ▶</button>
  </div>

  <!-- finale overlay -->
  <div class="overlay" id="ovFin">
    <div class="burst">🏰👑✨</div>
    <div class="ov-word">All done!</div>
    <div class="ov-sub">You spelled every word, Princess! 💖</div>
    <button class="ov-btn" id="ovRestart">Play again 🔄</button>
  </div>

<script>
const WORDS = [
  {w:"cat", pic:"🐱"}, {w:"dog", pic:"🐶"}, {w:"sun", pic:"☀️"},
  {w:"car", pic:"🚗"}, {w:"cup", pic:"🥤"}, {w:"bus", pic:"🚌"},
  {w:"hat", pic:"👒"}, {w:"bed", pic:"🛏️"}, {w:"pig", pic:"🐷"},
  {w:"cow", pic:"🐮"}, {w:"bug", pic:"🐛"}, {w:"box", pic:"📦"},
  {w:"key", pic:"🔑"}, {w:"mom", pic:"👩"}, {w:"dad", pic:"👨"}
];

let current = 0;
let nextIndex = 0;
let busy = false;
const solved = new Set();
let showWord = true;
let soundOn = true;

const $ = id => document.getElementById(id);
const slotsEl = $("slots"), trayEl = $("tray"), picEl = $("pic"),
      modelEl = $("model"), counterEl = $("counter"), crownsEl = $("crowns");

/* ----- audio (gentle, optional) ----- */
let actx = null;
function tone(freq, dur, when=0, vol=0.18){
  if(!soundOn) return;
  try{
    actx = actx || new (window.AudioContext||window.webkitAudioContext)();
    const o = actx.createOscillator(), g = actx.createGain();
    o.type = "sine"; o.frequency.value = freq;
    o.connect(g); g.connect(actx.destination);
    const t = actx.currentTime + when;
    g.gain.setValueAtTime(0, t);
    g.gain.linearRampToValueAtTime(vol, t+0.02);
    g.gain.exponentialRampToValueAtTime(0.0001, t+dur);
    o.start(t); o.stop(t+dur);
  }catch(e){}
}
const tick = () => tone(660, 0.18, 0, 0.14);
function fanfare(){ [523,659,784,1047].forEach((f,i)=>tone(f,0.5,i*0.12,0.16)); }

/* ----- crown progress strip ----- */
function buildCrowns(){
  crownsEl.innerHTML = "";
  WORDS.forEach((_,i)=>{
    const s = document.createElement("span");
    s.className = "cr"; s.textContent = "👑"; s.dataset.i = i;
    crownsEl.appendChild(s);
  });
}
function refreshCrowns(){
  [...crownsEl.children].forEach((c,i)=> c.classList.toggle("on", solved.has(i)));
}

/* ----- shuffle so it never starts already solved ----- */
function scramble(word){
  const arr = word.split("");
  if(arr.length < 2) return arr;
  let out;
  do{
    out = arr.slice();
    for(let i=out.length-1;i>0;i--){
      const j = Math.floor(Math.random()*(i+1));
      [out[i],out[j]] = [out[j],out[i]];
    }
  } while(out.join("") === word);
  return out;
}

/* ----- load a word ----- */
function load(i){
  current = ((i % WORDS.length) + WORDS.length) % WORDS.length;
  nextIndex = 0; busy = false;
  const {w, pic} = WORDS[current];
  picEl.textContent = pic;
  modelEl.textContent = w;
  modelEl.classList.toggle("hide", !showWord);
  counterEl.textContent = (current+1) + " / " + WORDS.length;

  slotsEl.innerHTML = "";
  for(let s=0;s<w.length;s++){
    const d = document.createElement("div");
    d.className = "slot"; d.dataset.slot = s;
    slotsEl.appendChild(d);
  }
  trayEl.innerHTML = "";
  scramble(w).forEach(letter=>{
    const t = document.createElement("button");
    t.className = "tile"; t.textContent = letter; t.dataset.letter = letter;
    t.addEventListener("click", ()=>onTile(t, letter));
    trayEl.appendChild(t);
  });
  refreshCrowns();
}

/* ----- tile tap (errorless: wrong taps just wiggle) ----- */
function onTile(tile, letter){
  if(busy || tile.classList.contains("gone")) return;
  const target = WORDS[current].w;
  if(letter === target[nextIndex]){
    const slot = slotsEl.children[nextIndex];
    slot.textContent = letter;
    slot.classList.add("filled");
    tile.classList.add("gone");
    sparkleAt(slot);
    tick();
    nextIndex++;
    if(nextIndex === target.length){ wordComplete(); }
  } else {
    tile.classList.remove("wiggle"); void tile.offsetWidth;
    tile.classList.add("wiggle");
  }
}

/* ----- success ----- */
function wordComplete(){
  busy = true;
  solved.add(current);
  refreshCrowns();
  fanfare();
  for(let k=0;k<10;k++) setTimeout(()=>sparkleBurst(), k*70);
  setTimeout(()=>{
    if(solved.size === WORDS.length){ $("ovFin").classList.add("show"); return; }
    $("ovBurst").textContent = ["🌟","🎉","✨","💖","🦄"][Math.floor(Math.random()*5)];
    $("ovWordText").textContent = WORDS[current].w.toUpperCase();
    $("ovWord").classList.add("show");
  }, 650);
}

/* ----- sparkles ----- */
function spawnSpark(x,y){
  const s = document.createElement("div");
  s.className = "spark";
  s.textContent = ["✨","⭐","🌟","💖","👑"][Math.floor(Math.random()*5)];
  s.style.left = x+"px"; s.style.top = y+"px";
  document.body.appendChild(s);
  setTimeout(()=>s.remove(), 1300);
}
function sparkleAt(el){
  const r = el.getBoundingClientRect();
  for(let k=0;k<5;k++){
    spawnSpark(r.left + r.width/2 + (Math.random()*60-30),
               r.top + r.height/2 + (Math.random()*40-20));
  }
}
function sparkleBurst(){
  spawnSpark(Math.random()*window.innerWidth, window.innerHeight*0.55 + Math.random()*120);
}

/* ----- hint: highlight the next correct tile ----- */
function hint(){
  if(busy) return;
  const need = WORDS[current].w[nextIndex];
  const tile = [...trayEl.children].find(t=>!t.classList.contains("gone") && t.dataset.letter===need);
  if(tile){
    tile.classList.add("hintGlow");
    setTimeout(()=>tile.classList.remove("hintGlow"), 2200);
  }
}

/* ----- controls ----- */
$("prev").addEventListener("click", ()=>load(current-1));
$("next").addEventListener("click", ()=>load(current+1));
$("redo").addEventListener("click", ()=>load(current));
$("hint").addEventListener("click", hint);
$("showWord").addEventListener("click", e=>{
  showWord = !showWord;
  e.currentTarget.classList.toggle("off", !showWord);
  modelEl.classList.toggle("hide", !showWord);
});
$("sound").addEventListener("click", e=>{
  soundOn = !soundOn;
  e.currentTarget.classList.toggle("off", !soundOn);
  if(soundOn) tick();
});
$("ovNext").addEventListener("click", ()=>{
  $("ovWord").classList.remove("show");
  let nx = current+1;
  while(solved.has(nx % WORDS.length) && solved.size < WORDS.length) nx++;
  load(nx);
});
$("ovRestart").addEventListener("click", ()=>{
  solved.clear(); $("ovFin").classList.remove("show"); load(0);
});

/* ----- init ----- */
buildCrowns();
load(0);
</script>
</body>
</html>
