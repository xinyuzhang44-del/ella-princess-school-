<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Princess Counting 👑</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root{
    --cream:#fdf6ee; --blush:#f7e7ef;
    --gold:#e6ab46; --gold-soft:#f6d488;
    --lav:#a87fce; --lav-deep:#7d57a6;
    --rose:#e892ab; --plum:#4f3d5c;
    --green:#5fb878; --slot:#f3e6f4;
    --font:"Fredoka","Trebuchet MS",-apple-system,system-ui,sans-serif;
  }
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
  html,body{margin:0;height:100%;}
  body{
    font-family:var(--font);color:var(--plum);
    background:
      radial-gradient(1200px 600px at 50% -10%, #fff7e9 0%, transparent 60%),
      radial-gradient(900px 500px at 90% 110%, #f3e2f3 0%, transparent 55%),
      linear-gradient(160deg, var(--cream), var(--blush));
    min-height:100%;display:flex;flex-direction:column;overflow-x:hidden;
    -webkit-user-select:none;user-select:none;touch-action:manipulation;
  }
  header{padding:14px 18px 6px;text-align:center;}
  .title{
    font-size:clamp(24px,5vw,38px);font-weight:700;letter-spacing:.5px;
    color:var(--lav-deep);text-shadow:0 2px 0 #fff,0 4px 14px rgba(125,87,166,.18);margin:0;
  }
  .title .c{color:var(--gold);}
  .crowns{display:flex;flex-wrap:wrap;justify-content:center;gap:5px;margin:10px auto 2px;max-width:560px;}
  .crowns .cr{font-size:18px;line-height:1;filter:grayscale(1) opacity(.32);transition:transform .35s,filter .35s;}
  .crowns .cr.on{filter:none;transform:scale(1.18);}
  .bar{display:flex;align-items:center;justify-content:center;gap:8px;flex-wrap:wrap;margin-top:8px;}
  .btn{
    font-family:var(--font);font-weight:600;font-size:15px;color:var(--plum);
    background:#fff;border:2px solid #ecdcc4;border-radius:999px;padding:8px 14px;cursor:pointer;
    display:inline-flex;align-items:center;gap:6px;box-shadow:0 3px 0 rgba(0,0,0,.05);transition:transform .12s,background .2s;
  }
  .btn:active{transform:translateY(2px);box-shadow:none;}
  .btn.toggle.off{background:#f0e7e7;color:#b4a6a6;border-color:#e2d6d6;}
  .counter{font-weight:600;font-size:15px;color:var(--lav-deep);background:#fff;border-radius:999px;padding:8px 14px;border:2px solid #e7d8ef;}
  .nav{background:#fff;border:2px solid #e7d8ef;border-radius:50%;width:40px;height:40px;font-size:20px;color:var(--lav-deep);cursor:pointer;display:inline-flex;align-items:center;justify-content:center;}
  .nav:active{transform:scale(.92);}
  main{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:clamp(14px,3vh,24px);padding:10px 14px 26px;}
  .stage{
    background:rgba(255,255,255,.62);border:3px solid #fff;border-radius:32px;
    padding:clamp(16px,3.5vw,30px) clamp(16px,4vw,40px);
    box-shadow:0 20px 50px rgba(125,87,166,.16), inset 0 0 0 2px rgba(230,171,70,.18);
    display:flex;flex-direction:column;align-items:center;gap:clamp(14px,3vh,24px);backdrop-filter:blur(2px);max-width:96vw;
  }
  /* equation row */
  .eq{display:flex;align-items:center;justify-content:center;gap:clamp(8px,2.2vw,18px);flex-wrap:wrap;}
  .group{
    display:flex;flex-wrap:wrap;align-items:flex-end;justify-content:center;gap:6px;
    padding:8px 10px;border-radius:20px;background:rgba(255,255,255,.55);
    box-shadow:inset 0 0 0 2px rgba(168,127,206,.18);max-width:46vw;
  }
  .op{font-size:clamp(30px,7vw,54px);font-weight:700;color:var(--lav-deep);}
  .princess{position:relative;width:clamp(42px,8.5vw,66px);cursor:pointer;transition:transform .15s;}
  .princess:active{transform:scale(.9);}
  .princess svg{width:100%;height:auto;display:block;filter:drop-shadow(0 4px 5px rgba(0,0,0,.12));}
  .badge{
    position:absolute;top:-6px;right:-4px;min-width:22px;height:22px;border-radius:50%;
    background:var(--rose);color:#fff;font-size:13px;font-weight:700;display:none;
    align-items:center;justify-content:center;box-shadow:0 2px 5px rgba(0,0,0,.25);
    animation:pop .35s cubic-bezier(.2,1.4,.4,1);
  }
  .princess.counted .badge{display:flex;}
  @keyframes pop{0%{transform:scale(.4);}60%{transform:scale(1.2);}100%{transform:scale(1);}}
  .qbox{
    width:clamp(58px,15vw,90px);height:clamp(58px,15vw,90px);border-radius:22px;background:var(--slot);
    border:3px dashed #c9aedd;display:flex;align-items:center;justify-content:center;
    font-size:clamp(34px,9vw,56px);font-weight:700;color:var(--lav-deep);transition:.25s;
  }
  .qbox.ghost{color:rgba(125,87,166,.32);}
  .qbox.filled{background:linear-gradient(180deg,#eafbef,#d6f3df);border:3px solid var(--green);color:#2f7a45;animation:pop .4s cubic-bezier(.2,1.4,.4,1);}
  /* answer choices */
  .answers{display:flex;gap:clamp(10px,3vw,18px);flex-wrap:wrap;justify-content:center;}
  .ans{
    width:clamp(60px,15vw,92px);height:clamp(60px,15vw,92px);border-radius:22px;background:#fff;
    border:3px solid var(--gold-soft);font-family:var(--font);font-size:clamp(32px,8vw,54px);font-weight:600;color:var(--gold);
    cursor:pointer;display:flex;align-items:center;justify-content:center;
    box-shadow:0 6px 0 #e9d3a3,0 10px 20px rgba(230,171,70,.25);transition:transform .12s,box-shadow .12s,opacity .25s;
  }
  .ans:active{transform:translateY(4px);box-shadow:0 2px 0 #e9d3a3;}
  .ans.wiggle{animation:wig .42s ease;}
  @keyframes wig{0%,100%{transform:translateX(0);}20%{transform:translateX(-8px) rotate(-4deg);}40%{transform:translateX(8px) rotate(4deg);}60%{transform:translateX(-6px) rotate(-3deg);}80%{transform:translateX(6px) rotate(3deg);}}
  .ans.glow{animation:glow 1s ease infinite;border-color:var(--rose);}
  @keyframes glow{0%,100%{transform:translateY(0) scale(1);box-shadow:0 6px 0 #e9d3a3,0 0 0 0 rgba(232,146,171,.6);}50%{transform:translateY(-8px) scale(1.06);box-shadow:0 12px 0 #e9d3a3,0 0 0 12px rgba(232,146,171,0);}}
  .ans.done{opacity:.35;pointer-events:none;}
  .spark{position:fixed;pointer-events:none;font-size:26px;animation:rise 1.3s ease-out forwards;z-index:40;}
  @keyframes rise{0%{opacity:0;transform:translateY(0) scale(.4);}15%{opacity:1;}100%{opacity:0;transform:translateY(-130px) scale(1.3) rotate(40deg);}}
  .overlay{position:fixed;inset:0;display:none;flex-direction:column;align-items:center;justify-content:center;gap:22px;background:rgba(79,61,92,.32);backdrop-filter:blur(4px);z-index:50;animation:fade .3s;}
  .overlay.show{display:flex;}
  @keyframes fade{from{opacity:0;}to{opacity:1;}}
  .burst{font-size:clamp(60px,18vw,130px);animation:pop .5s cubic-bezier(.2,1.4,.4,1);}
  .ov-word{font-size:clamp(30px,8vw,56px);font-weight:700;color:#fff;letter-spacing:.1em;text-shadow:0 4px 16px rgba(0,0,0,.3);}
  .ov-sub{color:#fff;font-size:20px;font-weight:500;opacity:.95;text-shadow:0 2px 8px rgba(0,0,0,.3);}
  .ov-btn{font-family:var(--font);font-weight:700;font-size:22px;color:#fff;background:linear-gradient(180deg,var(--rose),#d4748f);border:none;border-radius:999px;padding:16px 40px;cursor:pointer;box-shadow:0 8px 0 #b85f78,0 14px 30px rgba(0,0,0,.25);display:inline-flex;align-items:center;gap:10px;}
  .ov-btn:active{transform:translateY(4px);box-shadow:0 4px 0 #b85f78;}
</style>
</head>
<body>
  <header>
    <h1 class="title">👑 Princess <span class="c">Counting</span> 👑</h1>
    <div class="crowns" id="crowns"></div>
    <div class="bar">
      <button class="nav" id="prev">◀</button>
      <span class="counter" id="counter">1 / 15</span>
      <button class="nav" id="next">▶</button>
      <button class="btn" id="hint">💡 Count</button>
      <button class="btn" id="redo">🔄 Again</button>
      <button class="btn toggle" id="showAns">👁 Answer</button>
      <button class="btn toggle" id="sound">🔊 Sound</button>
    </div>
  </header>

  <main>
    <div class="stage">
      <div class="eq">
        <div class="group" id="groupA"></div>
        <div class="op">+</div>
        <div class="group" id="groupB"></div>
        <div class="op">=</div>
        <div class="qbox" id="qbox">?</div>
      </div>
      <div class="answers" id="answers"></div>
    </div>
  </main>

  <div class="overlay" id="ovWord">
    <div class="burst" id="ovBurst">🌟</div>
    <div class="ov-word" id="ovWordText">2 + 3 = 5</div>
    <button class="ov-btn" id="ovNext">Next ▶</button>
  </div>
  <div class="overlay" id="ovFin">
    <div class="burst">🏰👑✨</div>
    <div class="ov-word">All done!</div>
    <div class="ov-sub">You counted every princess! 💖</div>
    <button class="ov-btn" id="ovRestart">Play again 🔄</button>
  </div>

<script>
/* ---------- 15 questions, all sums within 10 ---------- */
const Q = [
  [1,1],[2,1],[2,2],[3,1],[3,2],[4,1],[3,3],[4,2],
  [4,3],[5,2],[4,4],[5,3],[5,4],[6,3],[5,5]
];

/* ---------- original cartoon princess cast (drawn fresh, not Disney) ---------- */
const CAST = [
  {dress:"#f48fb1",trim:"#ffd1e0",hair:"#6b4423",skin:"#fbe0c4",gem:"#7ab8e8"},
  {dress:"#b07cd6",trim:"#e3cdf2",hair:"#2b2330",skin:"#f1c8a0",gem:"#f48fb1"},
  {dress:"#7ab8e8",trim:"#cfe7f7",hair:"#e8c469",skin:"#fbe0c4",gem:"#ef7d9b"},
  {dress:"#58c4b0",trim:"#cdeee7",hair:"#3a2a3a",skin:"#d9a877",gem:"#f0c860"},
  {dress:"#ef7d9b",trim:"#fbd2dd",hair:"#a0522d",skin:"#f1c8a0",gem:"#8fd6a8"},
  {dress:"#c9a3e8",trim:"#ece0f7",hair:"#2b2330",skin:"#b07d54",gem:"#f6d488"},
  {dress:"#f6b08a",trim:"#fbe0d2",hair:"#6b4423",skin:"#8d5a3a",gem:"#7ab8e8"},
  {dress:"#8fd6a8",trim:"#d6f1e0",hair:"#e8c469",skin:"#fbe0c4",gem:"#b07cd6"},
  {dress:"#f0c860",trim:"#fbeec0",hair:"#3a2a3a",skin:"#d9a877",gem:"#ef7d9b"},
  {dress:"#e892ab",trim:"#fbd6e1",hair:"#2b2330",skin:"#f1c8a0",gem:"#58c4b0"},
  {dress:"#9bb8f0",trim:"#d6e1fb",hair:"#a0522d",skin:"#fbe0c4",gem:"#f0c860"},
  {dress:"#d68fc4",trim:"#f3d6ec",hair:"#6b4423",skin:"#d9a877",gem:"#8fd6a8"}
];
function princessSVG(p){
  return `<svg viewBox="0 0 100 132" xmlns="http://www.w3.org/2000/svg">
    <path d="M50 66 L82 126 Q50 134 18 126 Z" fill="${p.dress}"/>
    <path d="M50 66 L64 104 Q50 109 36 104 Z" fill="${p.trim}" opacity=".75"/>
    <path d="M30 80 q-10 12 -6 30" stroke="${p.skin}" stroke-width="7" fill="none" stroke-linecap="round"/>
    <path d="M70 80 q10 12 6 30" stroke="${p.skin}" stroke-width="7" fill="none" stroke-linecap="round"/>
    <rect x="44" y="54" width="12" height="14" rx="5" fill="${p.skin}"/>
    <path d="M28 44 q0 26 22 30 q22 -4 22 -30 q0 -8 -6 -10 H34 q-6 2 -6 10Z" fill="${p.hair}"/>
    <circle cx="50" cy="40" r="18" fill="${p.skin}"/>
    <path d="M32 40 q-3 -22 18 -24 q21 2 18 24 q-4 -12 -18 -12 q-14 0 -18 12Z" fill="${p.hair}"/>
    <path d="M37 22 L42 11 L46 19 L50 8 L54 19 L58 11 L63 22 Q50 26 37 22Z" fill="#f4cf5e" stroke="#d6a93a" stroke-width="1.5"/>
    <circle cx="50" cy="14" r="2.4" fill="${p.gem}"/>
    <circle cx="42.5" cy="40" r="2.4" fill="#3a2a3a"/>
    <circle cx="57.5" cy="40" r="2.4" fill="#3a2a3a"/>
    <circle cx="40" cy="46" r="3" fill="#f7a8bd" opacity=".6"/>
    <circle cx="60" cy="46" r="3" fill="#f7a8bd" opacity=".6"/>
    <path d="M44 48 q6 5 12 0" stroke="#b5566e" stroke-width="2" fill="none" stroke-linecap="round"/>
  </svg>`;
}

/* ---------- state ---------- */
let current=0, total=0, countIdx=0, busy=false;
const solved=new Set();
let showAns=false, soundOn=true;
const $=id=>document.getElementById(id);
const gA=$("groupA"), gB=$("groupB"), ansEl=$("answers"), qbox=$("qbox"),
      counterEl=$("counter"), crownsEl=$("crowns");

/* ---------- audio ---------- */
let actx=null;
function tone(f,d,when=0,vol=.16){
  if(!soundOn) return;
  try{
    actx=actx||new (window.AudioContext||window.webkitAudioContext)();
    const o=actx.createOscillator(),g=actx.createGain();
    o.type="sine";o.frequency.value=f;o.connect(g);g.connect(actx.destination);
    const t=actx.currentTime+when;
    g.gain.setValueAtTime(0,t);g.gain.linearRampToValueAtTime(vol,t+.02);
    g.gain.exponentialRampToValueAtTime(.0001,t+d);o.start(t);o.stop(t+d);
  }catch(e){}
}
const tick=()=>tone(700,.16,0,.12);
const fanfare=()=>[523,659,784,1047].forEach((f,i)=>tone(f,.5,i*.12,.15));

/* ---------- crowns ---------- */
function buildCrowns(){
  crownsEl.innerHTML="";
  Q.forEach(()=>{const s=document.createElement("span");s.className="cr";s.textContent="👑";crownsEl.appendChild(s);});
}
const refreshCrowns=()=>[...crownsEl.children].forEach((c,i)=>c.classList.toggle("on",solved.has(i)));

/* ---------- princess builder with tap-to-count ---------- */
let castOffset=0;
function makePrincess(){
  const wrap=document.createElement("div");
  wrap.className="princess";
  const p=CAST[castOffset++ % CAST.length];
  wrap.innerHTML=princessSVG(p)+`<span class="badge"></span>`;
  wrap.addEventListener("click",()=>{
    if(busy||wrap.classList.contains("counted")) return;
    countIdx++; wrap.querySelector(".badge").textContent=countIdx;
    wrap.classList.add("counted"); tick();
  });
  return wrap;
}

/* ---------- load question ---------- */
function load(i){
  current=((i%Q.length)+Q.length)%Q.length;
  const [a,b]=Q[current]; total=a+b; countIdx=0; busy=false; castOffset=current*3;
  counterEl.textContent=(current+1)+" / "+Q.length;
  gA.innerHTML=""; gB.innerHTML="";
  for(let k=0;k<a;k++) gA.appendChild(makePrincess());
  for(let k=0;k<b;k++) gB.appendChild(makePrincess());
  qbox.className="qbox"+(showAns?" ghost":"");
  qbox.textContent= showAns? total : "?";

  // answer choices: correct + distractors (1..10)
  const opts=new Set([total]);
  [total-1,total+1,total-2,total+2].forEach(v=>{ if(v>=1&&v<=10) opts.add(v); });
  let arr=[...opts]; while(arr.length>4) arr.pop();
  for(let s=arr.length-1;s>0;s--){const j=Math.floor(Math.random()*(s+1));[arr[s],arr[j]]=[arr[j],arr[s]];}
  ansEl.innerHTML="";
  arr.forEach(v=>{
    const t=document.createElement("button");
    t.className="ans"; t.textContent=v;
    t.addEventListener("click",()=>onAns(t,v));
    ansEl.appendChild(t);
  });
  refreshCrowns();
}

/* ---------- answer ---------- */
function onAns(tile,v){
  if(busy) return;
  if(v===total){ win(); }
  else { tile.classList.remove("wiggle"); void tile.offsetWidth; tile.classList.add("wiggle"); }
}
function badgeAll(){
  const all=[...gA.children,...gB.children];
  all.forEach((w,k)=>{ if(!w.classList.contains("counted")){ w.classList.add("counted"); w.querySelector(".badge").textContent=k+1; }});
}
function win(){
  busy=true; badgeAll();
  qbox.className="qbox filled"; qbox.textContent=total;
  [...ansEl.children].forEach(c=>c.classList.add("done"));
  solved.add(current); refreshCrowns(); fanfare();
  for(let k=0;k<10;k++) setTimeout(sparkleBurst,k*70);
  setTimeout(()=>{
    if(solved.size===Q.length){ $("ovFin").classList.add("show"); return; }
    const [a,b]=Q[current];
    $("ovBurst").textContent=["🌟","🎉","✨","💖","🦄"][Math.floor(Math.random()*5)];
    $("ovWordText").textContent=`${a} + ${b} = ${total}`;
    $("ovWord").classList.add("show");
  },700);
}

/* ---------- sparkles ---------- */
function spawnSpark(x,y){
  const s=document.createElement("div");s.className="spark";
  s.textContent=["✨","⭐","🌟","💖","👑"][Math.floor(Math.random()*5)];
  s.style.left=x+"px";s.style.top=y+"px";document.body.appendChild(s);
  setTimeout(()=>s.remove(),1300);
}
const sparkleBurst=()=>spawnSpark(Math.random()*innerWidth,innerHeight*.55+Math.random()*120);

/* ---------- hint: count princesses one by one, then glow answer ---------- */
function hint(){
  if(busy) return;
  const all=[...gA.children,...gB.children];
  all.forEach(w=>{ w.classList.remove("counted"); w.querySelector(".badge").textContent=""; });
  countIdx=0;
  all.forEach((w,k)=>setTimeout(()=>{
    countIdx=k+1; w.querySelector(".badge").textContent=countIdx; w.classList.add("counted"); tick();
    if(k===all.length-1){
      const right=[...ansEl.children].find(c=>+c.textContent===total);
      if(right){ right.classList.add("glow"); setTimeout(()=>right.classList.remove("glow"),2400); }
    }
  },k*430));
}

/* ---------- controls ---------- */
$("prev").onclick=()=>load(current-1);
$("next").onclick=()=>load(current+1);
$("redo").onclick=()=>load(current);
$("hint").onclick=hint;
$("showAns").onclick=e=>{ showAns=!showAns; e.currentTarget.classList.toggle("off",!showAns);
  if(!qbox.classList.contains("filled")){ qbox.className="qbox"+(showAns?" ghost":""); qbox.textContent=showAns?total:"?"; } };
$("sound").onclick=e=>{ soundOn=!soundOn; e.currentTarget.classList.toggle("off",!soundOn); if(soundOn) tick(); };
$("ovNext").onclick=()=>{ $("ovWord").classList.remove("show");
  let nx=current+1; while(solved.has(nx%Q.length)&&solved.size<Q.length) nx++; load(nx); };
$("ovRestart").onclick=()=>{ solved.clear(); $("ovFin").classList.remove("show"); load(0); };

buildCrowns(); load(0);
</script>
</body>
</html>
